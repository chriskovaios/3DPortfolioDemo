<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Anhelo Reka - 3D Portfolio</title>
  <meta name="description" content="A dark cinematic portfolio of abstract objects and characters, rendered as quiet specimens under a single light.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/styles.css">

  <!-- Three.js pinned via ESM import map. No npm install, no node_modules,
       no build step → zero dependency-vulnerability surface. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <nav class="nav">
    <div class="nav__brand">
      <span class="nav__mark"></span>
      <span class="nav__name">Anhelo Reka</span>
    </div>
    <div class="nav__links">
      <a href="#work">Work</a>
      <a href="#contact">Contact</a>
      <span class="nav__status"><span class="dot"></span>’26</span>
    </div>
  </nav>

  <!-- Scroll sequence. Height + snap markers + text layers are generated by JS
       from src/data/specimens.js — edit that file to change the project count. -->
  <main id="work" class="work">
    <div id="stage" class="stage">
      <canvas id="scene"></canvas>
      <div class="atmo atmo--glow" aria-hidden="true"></div>
      <div class="atmo atmo--vignette" aria-hidden="true"></div>
      <div class="grain" aria-hidden="true"></div>
      <div id="drag" class="drag" role="application" aria-label="Drag, or use W A S D, to rotate the object"></div>
      <!-- text layers injected here by JS -->
      <div id="loader" class="loader" aria-live="polite"></div>
      <div class="hint" aria-hidden="true">
        <span class="hint__keys">Drag &nbsp;·&nbsp; W A S D &nbsp; to rotate</span>
        <span class="hint__touch"><span class="hint__arrow">&larr;</span>Rotate<span class="hint__arrow">&rarr;</span></span>
      </div>
    </div>
  </main>

  <section id="contact" class="contact">
    <h2>Let’s make something<br>gay <em>looking</em> at.</h2>
    <div class="contact__row">
      <a class="btn" href="mailto:hello@rekasex.xyz">hello@rekasex.xyz <span>↗</span></a>
      <span class="contact__note">Open to studio collaborations &amp; select freelance, 2026.</span>
    </div>
    <div class="contact__foot">
      <span>© 2026 Chris Kovaios</span>
      <a href="#work">Back to top ↑</a>
    </div>
  </section>

  <script type="module" src="src/js/main.js"></script>
</body>
</html>
